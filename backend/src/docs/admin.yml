          schema:
            type: integer
          description: Vehicle ID
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vehicle_number:
                  type: string
                  example: MH12AB1234
                vehicle_type:
                  type: string
                  example: truck
                fuel_type:
                  type: string
                  example: diesel
                mileage:
                  type: number
                  example: 15
                fuel_tank_capacity:
                  type: number
                  example: 60
                is_active:
                  type: boolean
                  example: true
      responses:
        200:
          description: Vehicle updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Vehicle updated successfully
                  data:
                    type: object
                    properties:
                      vehicle_id:
                        type: integer
                        example: 1
                      vehicle_number:
                        type: string
                        example: MH12AB1234
                      vehicle_type:
                        type: string
                        example: truck
                      fuel_type:
                        type: string
                        example: diesel
                      mileage:
                        type: number
                        example: 15
                      fuel_tank_capacity:
                        type: number
                        example: 60
                      is_active:
                        type: boolean
                        example: true
        400:
          description: Invalid input or duplicate vehicle number
          content:
            application/json:
              example:
